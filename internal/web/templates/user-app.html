<!doctype html><html><head><title>Synamcps App</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
input,select,textarea,button{margin:4px;padding:8px;border-radius:6px;border:1px solid #334155;background:#111827;color:#e5e7eb}
button{cursor:pointer;background:#2563eb;border-color:#2563eb}
button.secondary{background:#1e293b;border-color:#334155}
a{color:#93c5fd;text-decoration:none}
pre{background:#020617;padding:12px;border-radius:8px;overflow:auto}
.layout{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.sidebar{background:#020617;border-right:1px solid #334155;padding:18px;box-sizing:border-box}
.sidebar-logo{display:block;width:104px;height:104px;object-fit:contain;margin-bottom:14px}
.main{padding:24px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.card{border:1px solid #334155;border-radius:10px;padding:14px;margin:10px 0;background:#111827}
.muted{color:#94a3b8}
.chat{border:1px solid #334155;border-radius:12px;background:#020617;padding:16px;overflow:auto;min-height:420px}
.msg{max-width:860px;margin:12px 0;padding:12px;border-radius:10px;white-space:pre-wrap;line-height:1.45}
.msg.user{background:#1d4ed8;margin-left:auto}
.msg.assistant{background:#111827;border:1px solid #334155}
.refs a{display:block;margin:6px 0}
.dataset{display:block;padding:5px 0}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.composer{display:grid;grid-template-columns:1fr auto;gap:8px}
.composer textarea{width:100%;box-sizing:border-box;min-height:72px}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#1e293b;color:#cbd5e1;margin:2px}
</style></head><body>
<div class="layout">
<aside class="sidebar">
<img class="sidebar-logo" src="/assets/synamcp-logo-small.png" alt="Synamcps"/>
<div class="row" style="justify-content:space-between"><b id="currentUser">Loading...</b><a href="/logout">Log out</a></div>
<div class="card">
<h3>Datasets</h3>
<button class="secondary" onclick="loadStorages()">Refresh</button>
<div id="datasets" class="muted">Loading storages...</div>
<button onclick="createConversation()">New chat with selected</button>
</div>
<div class="card">
<h3>Conversations</h3>
<button class="secondary" onclick="loadConversations()">Refresh</button>
<div id="conversations" class="muted"></div>
</div>
<div class="card">
<h3>Knowledge</h3>
<input id="searchQuery" placeholder="Search selected datasets" style="width:95%"/>
<button onclick="manualSearch()">Search</button>
<pre id="searchOut"></pre>
</div>
<div class="card">
<h3>Tokens</h3>
<input id="tokenName" placeholder="token name" style="width:95%"/>
<select id="tokenMode"><option value="read">read</option><option value="read_write">read_write</option></select>
<button onclick="createToken()">Create</button>
<div id="rawTokenBox" style="display:none"><b>Raw token shown once</b><pre id="rawToken"></pre></div>
<div id="tokens" class="muted"></div>
<div class="row">
<select id="connectTokenId" style="max-width:160px"></select>
<input id="connectRawToken" placeholder="raw token for config" style="max-width:170px"/>
<button class="secondary" onclick="connectConfig()">Connect config</button>
</div>
<pre id="connectOut"></pre>
</div>
</aside>
<main class="main">
<div class="top">
<div>
<h1 style="margin:0">Synamcps Assistant</h1>
<div id="conversationMeta" class="muted">Choose datasets and start a conversation.</div>
</div>
<a href="/admin" id="adminLink" style="display:none">Admin</a>
</div>
<div id="chat" class="chat"></div>
<div>
<div id="refs" class="refs muted"></div>
<div class="composer">
<textarea id="messageText" placeholder="Ask a question, or say: remember ..."></textarea>
<button onclick="sendMessage()">Send</button>
</div>
</div>
</main>
</div>
<script>window.csrfToken='__CSRF_TOKEN__';</script>
<script src="/assets/user-app.js"></script>
</body></html>
