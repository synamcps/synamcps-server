openapi: 3.0.3
info:
  title: Synamcps Knowledge API
  version: 0.1.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/knowledge:
    get:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: list
    post:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "201":
          description: created
        "413":
          description: request body exceeds limits.max_upload_bytes
        "429":
          description: rate limit exceeded
  /api/knowledge/ingest/file:
    post:
      summary: Ingest a file (multipart/form-data)
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "201":
          description: created
        "413":
          description: request body exceeds limits.max_upload_bytes
        "429":
          description: rate limit exceeded
  /api/knowledge/ingest/link:
    post:
      summary: Ingest a URL (http/https only; internal addresses are refused)
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "201":
          description: created
        "422":
          description: invalid or unsupported URL
        "429":
          description: rate limit exceeded
  /api/knowledge/search:
    post:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: search hits
        "429":
          description: rate limit exceeded
  /api/knowledge/{docId}:
    parameters:
      - in: path
        name: docId
        required: true
        schema:
          type: string
    get:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: one document
    delete:
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: deleted
